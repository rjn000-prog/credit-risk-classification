<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Risk Prediction</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f8fafc;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
            outline: none;
        }
        .input-label {
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
            display: block;
        }
        select option {
            background-color: #0f172a;
            color: white;
        }
        
        .btn-predict {
            background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4);
        }
        .btn-predict:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.6);
        }
        
        .prediction-result {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .risk-high {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
        }
        
        .risk-low {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.1);
        }

        /* Customize select arrow for dark mode */
        select {
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
        }
    </style>
</head>
<body class="antialiased flex items-center justify-center min-h-screen py-10 px-4 md:px-8">

    <div class="w-full max-w-5xl glass-card rounded-3xl p-8 md:p-12 relative overflow-hidden">
        
        <!-- Decoration blur blobs -->
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-indigo-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40"></div>
        <div class="absolute -bottom-40 -right-40 w-96 h-96 bg-purple-600 rounded-full mix-blend-multiply filter blur-[100px] opacity-40"></div>

        <div class="relative z-10">
            <div class="text-center mb-12">
                <div class="inline-flex items-center justify-center p-3 bg-indigo-500/10 rounded-2xl mb-4 border border-indigo-500/20">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                    </svg>
                </div>
                <h1 class="text-3xl md:text-5xl font-bold tracking-tight text-white mb-3">
                    Risk<span class="text-indigo-400">Intelligence</span>
                </h1>
                <p class="text-slate-400 text-sm md:text-lg max-w-2xl mx-auto">AI-powered credit risk assessment. Enter the applicant's profile to generate an instant prediction.</p>
            </div>

            {% if prediction_text %}
            <div class="mb-10 p-6 md:p-8 rounded-2xl text-center prediction-result flex flex-col items-center justify-center space-y-3
                {% if 'High Risk' in prediction_text %} risk-high {% else %} risk-low {% endif %}
            ">
                <div class="text-sm uppercase tracking-[0.2em] font-bold opacity-70">Assessment Result</div>
                <div class="text-3xl md:text-4xl font-extrabold tracking-tight">{{ prediction_text }}</div>
            </div>
            {% endif %}

            <form action="/predict" method="post" class="space-y-8">
                
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6 md:gap-8">
                    
                    <!-- Basic Info -->
                    <div>
                        <label class="input-label">Age</label>
                        <input type="number" name="age" placeholder="e.g. 30" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>
                    <div>
                        <label class="input-label">Loan Amount (DM)</label>
                        <input type="number" name="amount" placeholder="e.g. 5000" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>
                    <div>
                        <label class="input-label">Duration (Months)</label>
                        <input type="number" name="duration" placeholder="e.g. 24" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>

                    <!-- Financials -->
                    <div>
                        <label class="input-label">Account Status</label>
                        <select name="status" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="... &lt; 100 DM">... &lt; 100 DM</option>
                            <option value="0 &lt;= ... &lt; 200 DM">0 &lt;= ... &lt; 200 DM</option>
                            <option value="&gt;= 200 DM">&gt;= 200 DM</option>
                            <option value="no checking account">no checking account</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Credit History</label>
                        <select name="credit_history" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="critical account/other credits existing">critical account/other credits existing</option>
                            <option value="existing credits paid back duly till now">existing credits paid back duly till now</option>
                            <option value="delay in paying off in the past">delay in paying off in the past</option>
                            <option value="no credits taken/all credits paid back duly">no credits taken/all credits paid back duly</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Purpose</label>
                        <select name="purpose" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="radio/television">radio/television</option>
                            <option value="car (new)">car (new)</option>
                            <option value="car (used)">car (used)</option>
                            <option value="furniture/equipment">furniture/equipment</option>
                            <option value="business">business</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Savings</label>
                        <select name="savings" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="... &lt; 100 DM">... &lt; 100 DM</option>
                            <option value="100 &lt;= ... &lt; 500 DM">100 &lt;= ... &lt; 500 DM</option>
                            <option value="&gt;= 1000 DM">&gt;= 1000 DM</option>
                            <option value="unknown/no savings account">unknown/no savings account</option>
                        </select>
                    </div>

                    <!-- Additional Features -->
                    <div>
                        <label class="input-label">Personal Status & Sex</label>
                        <select name="personal_status" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="male : single">Male: Single</option>
                            <option value="female : divorced/separated/married">Female: Divorced/Separated/Married</option>
                            <option value="male : divorced/separated">Male: Divorced/Separated</option>
                            <option value="male : married/widowed">Male: Married/Widowed</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Other Debtors / Guarantors</label>
                        <select name="other_debtors" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="none">None</option>
                            <option value="guarantor">Guarantor</option>
                            <option value="co-applicant">Co-applicant</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Present Residence (Years)</label>
                        <input type="number" name="residence" min="0" placeholder="e.g. 4" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>

                    <div>
                        <label class="input-label">Property</label>
                        <select name="property" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="real estate">Real Estate</option>
                            <option value="building society savings agreement/life insurance">Building Society Savings / Life Insurance</option>
                            <option value="car or other">Car or Other</option>
                            <option value="unknown/no property">Unknown / No Property</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Other Installment Plans</label>
                        <select name="other_plans" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="none">None</option>
                            <option value="bank">Bank</option>
                            <option value="stores">Stores</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Installment Rate (%)</label>
                        <input type="number" name="installment_rate" min="0" placeholder="e.g. 4" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>

                    <div>
                        <label class="input-label">Number of Credits</label>
                        <input type="number" name="credits" min="0" placeholder="e.g. 1" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>

                    <div>
                        <label class="input-label">People Liable (Dependents)</label>
                        <input type="number" name="liable" min="0" placeholder="e.g. 1" required class="input-field w-full px-5 py-3.5 rounded-xl">
                    </div>

                    <!-- Personal Profile -->
                    <div>
                        <label class="input-label">Employment</label>
                        <select name="employment" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="unemployed">unemployed</option>
                            <option value="&lt; 1 year">&lt; 1 year</option>
                            <option value="1 &lt;= ... &lt; 4 years">1 &lt;= ... &lt; 4 years</option>
                            <option value="4 &lt;= ... &lt; 7 years">4 &lt;= ... &lt; 7 years</option>
                            <option value="&gt;= 7 years">&gt;= 7 years</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Housing</label>
                        <select name="housing" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="own">own</option>
                            <option value="rent">rent</option>
                            <option value="for free">for free</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Job Type</label>
                        <select name="job" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="skilled employee/official">skilled employee/official</option>
                            <option value="unskilled - resident">unskilled - resident</option>
                            <option value="management/self-employed">management/self-employed</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Telephone</label>
                        <select name="telephone" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="yes">yes</option>
                            <option value="no">no</option>
                        </select>
                    </div>

                    <div>
                        <label class="input-label">Foreign Worker</label>
                        <select name="foreign_worker" class="input-field w-full px-5 py-3.5 rounded-xl appearance-none cursor-pointer">
                            <option value="yes">yes</option>
                            <option value="no">no</option>
                        </select>
                    </div>
                </div>

                <div class="pt-8 border-t border-white/10 mt-10 text-center flex justify-center">
                    <button type="submit" class="btn-predict w-full md:w-1/2 lg:w-1/3 px-8 py-4 rounded-xl font-bold text-white text-lg flex items-center justify-center gap-3">
                        <span>Analyze Risk</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3" />
                        </svg>
                    </button>
                </div>

            </form>
        </div>
    </div>

</body>
</html>
